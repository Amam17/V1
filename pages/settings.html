<div class="main">

<header>

<div>

<h1>Settings</h1>

<p>System Configuration</p>

</div>

</header>

<section class="panel">

<h3>Company Information</h3>

<br>

<label>Company Name</label>

<input
type="text"
id="companyName"
placeholder="MegaNet WiFi">

<br><br>

<label>Company Email</label>

<input
type="email"
id="companyEmail"
placeholder="admin@meganet.com">

<br><br>

<label>Phone Number</label>

<input
type="text"
id="companyPhone"
placeholder="+234">

<br><br>

<button id="saveCompany">

Save Company

</button>

</section>

<br>

<section class="panel">

<h3>Huawei Configuration</h3>

<br>

<label>Project ID</label>

<input
type="text"
id="projectId">

<br><br>

<label>Tenant ID</label>

<input
type="text"
id="tenantId">

<br><br>

<label>CSRF Token</label>

<input
type="text"
id="csrfToken">

<br><br>

<button id="saveHuawei">

Save Huawei

</button>

</section>

<br>

<section class="panel">

<h3>Firebase</h3>

<br>

<label>API Key</label>

<input
type="text"
id="apiKey">

<br><br>

<label>Project ID</label>

<input
type="text"
id="firebaseProject">

<br><br>

<button id="saveFirebase">

Save Firebase

</button>

</section>

</div>
